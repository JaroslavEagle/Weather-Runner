<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a2e;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            padding: 20px;
        }

        .overlay.hidden {
            display: none;
        }

        .weather-info {
            text-align: center;
            margin-bottom: clamp(20px, 4vh, 40px);
        }

        .weather-icon {
            font-size: clamp(60px, 12vw, 100px);
            margin-bottom: 15px;
        }

        .temperature {
            font-size: clamp(28px, 5vw, 48px);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .weather-description {
            font-size: clamp(16px, 3vw, 24px);
            opacity: 0.9;
        }

        button {
            padding: clamp(12px, 2vh, 20px) clamp(30px, 5vw, 50px);
            font-size: clamp(16px, 3vw, 24px);
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        input[type="text"] {
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: #2196F3 !important;
            box-shadow: 0 0 10px rgba(33, 150, 243, 0.3);
        }

        input[type="text"]::placeholder {
            color: #999;
        }

        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4CAF50;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: clamp(16px, 3vw, 28px);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 5;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        .score-display {
            text-align: right;
        }

        .notification {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: clamp(15px, 3vw, 25px) clamp(30px, 5vw, 50px);
            border-radius: 15px;
            font-size: clamp(20px, 4vw, 32px);
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 6;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .notification.show {
            opacity: 1;
        }

        .game-over-stats {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-over-stats div {
            margin: 10px 0;
            font-size: clamp(20px, 4vw, 32px);
        }

        .record {
            color: #FFD700;
        }

        h1 {
            font-size: clamp(32px, 6vw, 56px);
            margin-bottom: 20px;
            text-align: center;
        }

        p {
            font-size: clamp(14px, 2.5vw, 20px);
            text-align: center;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <!-- HUD -->
        <div class="hud" id="hud" style="display: none;">
            <div class="weather-hud">
                <span id="weatherIcon">☀️</span>
                <span id="cityDisplay" style="margin-right: 10px;">Москва</span>
                <span id="tempDisplay">20°C</span>
            </div>
            <div class="score-display">
                <span>Score: </span><span id="scoreDisplay">0</span>
            </div>
        </div>

        <!-- Notification -->
        <div class="notification" id="notification"></div>

        <!-- Start Screen -->
        <div class="overlay" id="startScreen">
            <h1>🏃 Weather Runner</h1>
            <p>Бесконечный раннер с реальной погодой!</p>
            
            <div style="margin: 20px 0; width: 100%; max-width: 400px;">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Введите название города (например: Москва)" 
                    style="width: 100%; padding: 12px 20px; font-size: 16px; border: 2px solid #4CAF50; border-radius: 8px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.9); color: #333;"
                >
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="searchCityButton" style="flex: 1; background: #2196F3;">🔍 Найти город</button>
                    <button id="useLocationButton" style="flex: 1; background: #FF9800;">📍 Моё местоположение</button>
                </div>
            </div>
            
            <button id="startButton">Играть со случайной погодой</button>
            <div class="loader" id="loader" style="display: none;"></div>
            <div class="weather-info" id="weatherInfo" style="display: none;">
                <div class="weather-icon" id="weatherIconLarge">☀️</div>
                <div class="temperature" id="tempLarge">20°C</div>
                <div style="font-size: 24px; margin-bottom: 10px; color: #4CAF50;" id="cityNameLarge">Москва</div>
                <div class="weather-description" id="weatherDesc">Ясно</div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div class="overlay hidden" id="gameOverScreen">
            <h1 style="font-size: 48px; margin-bottom: 20px;">Game Over!</h1>
            <div class="game-over-stats">
                <div>Score: <span id="finalScore">0</span></div>
                <div class="record">Record: <span id="highScore">0</span></div>
            </div>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                <button id="restartButton" style="flex: 1;">🔄 Играть снова</button>
                <button id="menuButton" style="flex: 1; background: #FF5722;">🏠 В меню</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // WEATHER SERVICE
        // ==========================================
        class WeatherService {
            constructor() {
                this.API_KEY = '4158b1f227860e4af6d07780f070954b';
                this.weatherData = null;
            }

            async getCurrentWeatherByCoords(lat, lon) {
                try {
                    const response = await fetch(
                        `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${this.API_KEY}&units=metric&lang=ru`
                    );
                    
                    if (!response.ok) throw new Error('Weather API error');
                    
                    const data = await response.json();
                    this.weatherData = {
                        temp: Math.round(data.main.temp),
                        weatherCode: data.weather[0].id,
                        description: data.weather[0].description,
                        icon: this.getWeatherIcon(data.weather[0].id),
                        cityName: data.name
                    };
                    
                    return this.weatherData;
                } catch (error) {
                    console.warn('Weather API failed:', error);
                    throw error;
                }
            }

            async getCurrentWeatherByCity(cityName) {
                try {
                    const response = await fetch(
                        `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(cityName)}&appid=${this.API_KEY}&units=metric&lang=ru`
                    );
                    
                    if (!response.ok) throw new Error('City not found');
                    
                    const data = await response.json();
                    this.weatherData = {
                        temp: Math.round(data.main.temp),
                        weatherCode: data.weather[0].id,
                        description: data.weather[0].description,
                        icon: this.getWeatherIcon(data.weather[0].id),
                        cityName: data.name
                    };
                    
                    return this.weatherData;
                } catch (error) {
                    console.warn('Weather API failed:', error);
                    throw error;
                }
            }

            async getCurrentWeather() {
                try {
                    const position = await this.getUserPosition();
                    return await this.getCurrentWeatherByCoords(position.lat, position.lon);
                } catch (error) {
                    console.warn('Geolocation failed, using fallback:', error);
                    return this.getFallbackWeather();
                }
            }

            getUserPosition() {
                return new Promise((resolve, reject) => {
                    if (!navigator.geolocation) {
                        reject(new Error('Geolocation not supported'));
                        return;
                    }
                    
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            resolve({
                                lat: position.coords.latitude,
                                lon: position.coords.longitude
                            });
                        },
                        (error) => reject(error)
                    );
                });
            }

            getWeatherIcon(code) {
                if (code >= 200 && code < 300) return '⛈';
                if (code >= 300 && code < 600) return '🌧';
                if (code >= 600 && code < 700) return '❄️';
                if (code === 800 || code === 801) return '☀️';
                return '⛅';
            }

            getFallbackWeather() {
                const weathers = [
                    { temp: 20, weatherCode: 800, description: 'clear sky', icon: '☀️' },
                    { temp: 15, weatherCode: 500, description: 'light rain', icon: '🌧' },
                    { temp: -5, weatherCode: 600, description: 'light snow', icon: '❄️' },
                    { temp: 18, weatherCode: 200, description: 'thunderstorm', icon: '⛈' }
                ];
                return weathers[Math.floor(Math.random() * weathers.length)];
            }

            mapWeatherToGameState(weatherCode) {
                if (weatherCode === 800 || weatherCode === 801) return 'SUNNY';
                if (weatherCode >= 200 && weatherCode < 600) return 'RAIN';
                if (weatherCode >= 600 && weatherCode < 700) return 'SNOW';
                if (weatherCode >= 200 && weatherCode < 300) return 'STORM';
                return 'SUNNY';
            }
        }

        // ==========================================
        // PLAYER CLASS
        // ==========================================
        class Player {
            constructor(x, groundY) {
                this.x = x;
                this.width = 30;
                this.height = 30;
                this.velocityY = 0;
                this.gravity = 0.5;
                this.jumpForce = -10;
                this.isOnGround = false;
                this.groundY = groundY;
                this.y = groundY - this.height; // Начинаем на земле
                this.color = '#4169E1';
                
                // Двойной прыжок
                this.jumpCount = 0;
                this.maxJumps = 2;
                
                // Система комикс-фраз
                this.phrases = [
                    'Вау!', 'Ого!', 'Ух ты!', 'Круто!', 'Лечу!',
                    'Выше!', 'Ещё!', 'Прыг!', 'Хоп!', 'Вжух!',
                    'Небо!', 'Свобода!', 'Полёт!', 'Мощь!', 'Бум!'
                ];
                this.currentPhrase = null;
                this.phraseTimer = 0;
                this.phraseDuration = 60; // 1 секунда при 60fps
            }

            jump() {
                if (this.jumpCount < this.maxJumps) {
                    this.velocityY = this.jumpForce;
                    this.isOnGround = false;
                    this.jumpCount++;
                    
                    // Показать случайную фразу при прыжке
                    if (this.jumpCount === 1) {
                        this.showRandomPhrase();
                    } else if (this.jumpCount === 2) {
                        // Особая фраза для двойного прыжка
                        const doubleJumpPhrases = ['Двойной!', 'Супер!', 'Мега!', 'Максимум!'];
                        this.currentPhrase = doubleJumpPhrases[Math.floor(Math.random() * doubleJumpPhrases.length)];
                        this.phraseTimer = this.phraseDuration;
                    }
                }
            }

            showRandomPhrase() {
                this.currentPhrase = this.phrases[Math.floor(Math.random() * this.phrases.length)];
                this.phraseTimer = this.phraseDuration;
            }

            update(currentGravity) {
                // Apply gravity
                this.velocityY += currentGravity || this.gravity;
                this.y += this.velocityY;

                // Ground collision
                if (this.y + this.height >= this.groundY) {
                    this.y = this.groundY - this.height;
                    this.velocityY = 0;
                    this.isOnGround = true;
                    this.jumpCount = 0; // Сброс счётчика прыжков
                }
                
                // Update phrase timer
                if (this.phraseTimer > 0) {
                    this.phraseTimer--;
                    if (this.phraseTimer <= 0) {
                        this.currentPhrase = null;
                    }
                }
            }

            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // Draw eye
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x + 18, this.y + 6, 8, 8);
                ctx.fillStyle = 'black';
                ctx.fillRect(this.x + 22, this.y + 8, 4, 4);
                
                // Draw comic phrase bubble
                if (this.currentPhrase && this.phraseTimer > 0) {
                    this.drawPhraseBubble(ctx);
                }
            }

            drawPhraseBubble(ctx) {
                const bubbleX = this.x + this.width / 2;
                const bubbleY = this.y - 40;
                const fontSize = 14;
                
                ctx.save();
                
                // Calculate text width
                ctx.font = `bold ${fontSize}px Arial`;
                const textMetrics = ctx.measureText(this.currentPhrase);
                const textWidth = textMetrics.width;
                const padding = 10;
                const bubbleWidth = textWidth + padding * 2;
                const bubbleHeight = fontSize + padding * 2;
                
                // Fade out effect
                const alpha = this.phraseTimer / this.phraseDuration;
                
                // Draw bubble background (white with border)
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.strokeStyle = `rgba(0, 0, 0, ${alpha})`;
                ctx.lineWidth = 2;
                
                // Rounded rectangle
                const radius = 8;
                ctx.beginPath();
                ctx.moveTo(bubbleX - bubbleWidth / 2 + radius, bubbleY - bubbleHeight / 2);
                ctx.lineTo(bubbleX + bubbleWidth / 2 - radius, bubbleY - bubbleHeight / 2);
                ctx.quadraticCurveTo(bubbleX + bubbleWidth / 2, bubbleY - bubbleHeight / 2, bubbleX + bubbleWidth / 2, bubbleY - bubbleHeight / 2 + radius);
                ctx.lineTo(bubbleX + bubbleWidth / 2, bubbleY + bubbleHeight / 2 - radius);
                ctx.quadraticCurveTo(bubbleX + bubbleWidth / 2, bubbleY + bubbleHeight / 2, bubbleX + bubbleWidth / 2 - radius, bubbleY + bubbleHeight / 2);
                ctx.lineTo(bubbleX - bubbleWidth / 2 + radius, bubbleY + bubbleHeight / 2);
                ctx.quadraticCurveTo(bubbleX - bubbleWidth / 2, bubbleY + bubbleHeight / 2, bubbleX - bubbleWidth / 2, bubbleY + bubbleHeight / 2 - radius);
                ctx.lineTo(bubbleX - bubbleWidth / 2, bubbleY - bubbleHeight / 2 + radius);
                ctx.quadraticCurveTo(bubbleX - bubbleWidth / 2, bubbleY - bubbleHeight / 2, bubbleX - bubbleWidth / 2 + radius, bubbleY - bubbleHeight / 2);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                // Draw tail (triangle pointing to player)
                ctx.beginPath();
                ctx.moveTo(bubbleX - 5, bubbleY + bubbleHeight / 2);
                ctx.lineTo(bubbleX + 5, bubbleY + bubbleHeight / 2);
                ctx.lineTo(bubbleX, bubbleY + bubbleHeight / 2 + 10);
                ctx.closePath();
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
                ctx.strokeStyle = `rgba(0, 0, 0, ${alpha})`;
                ctx.stroke();
                
                // Draw text
                ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.currentPhrase, bubbleX, bubbleY);
                
                ctx.restore();
            }

            getBounds() {
                return {
                    x: this.x,
                    y: this.y,
                    width: this.width,
                    height: this.height
                };
            }
        }

        // ==========================================
        // OBSTACLE CLASS
        // ==========================================
        class Obstacle {
            constructor(x, y, width, height, type) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.type = type; // 'rock', 'puddle', 'snowbank', 'lightning'
            }

            update(speed) {
                this.x -= speed;
            }

            draw(ctx) {
                switch (this.type) {
                    case 'rock':
                        ctx.fillStyle = '#696969';
                        ctx.fillRect(this.x, this.y, this.width, this.height);
                        break;
                    
                    case 'puddle':
                        ctx.fillStyle = 'rgba(0, 100, 255, 0.4)';
                        ctx.beginPath();
                        ctx.ellipse(
                            this.x + this.width / 2,
                            this.y + this.height / 2,
                            this.width / 2,
                            this.height / 2,
                            0, 0, Math.PI * 2
                        );
                        ctx.fill();
                        break;
                    
                    case 'snowbank':
                        ctx.fillStyle = '#F0F8FF';
                        ctx.fillRect(this.x, this.y, this.width, this.height);
                        ctx.strokeStyle = '#B0E0E6';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(this.x, this.y, this.width, this.height);
                        break;
                    
                    case 'lightning':
                        ctx.fillStyle = '#FFD700';
                        ctx.beginPath();
                        ctx.moveTo(this.x + this.width / 2, this.y);
                        ctx.lineTo(this.x, this.y + this.height / 2);
                        ctx.lineTo(this.x + this.width / 3, this.y + this.height / 2);
                        ctx.lineTo(this.x + this.width / 4, this.y + this.height);
                        ctx.lineTo(this.x + this.width / 2, this.y + this.height / 2);
                        ctx.lineTo(this.x + this.width * 2/3, this.y + this.height / 2);
                        ctx.closePath();
                        ctx.fill();
                        break;
                }
            }

            isOffScreen() {
                return this.x + this.width < 0;
            }

            getBounds() {
                return {
                    x: this.x,
                    y: this.y,
                    width: this.width,
                    height: this.height
                };
            }
        }

        // ==========================================
        // COLLECTIBLE CLASS
        // ==========================================
        class Collectible {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.width = 25;
                this.height = 25;
                this.type = type; // 'star', 'umbrella'
                this.collected = false;
            }

            update(speed) {
                this.x -= speed;
            }

            draw(ctx) {
                if (this.collected) return;

                if (this.type === 'star') {
                    ctx.fillStyle = '#FFD700';
                    ctx.font = '25px Arial';
                    ctx.fillText('⭐', this.x, this.y + 20);
                } else if (this.type === 'umbrella') {
                    ctx.fillStyle = '#FF6347';
                    ctx.font = '25px Arial';
                    ctx.fillText('☂️', this.x, this.y + 20);
                }
            }

            isOffScreen() {
                return this.x + this.width < 0;
            }

            getBounds() {
                return {
                    x: this.x,
                    y: this.y,
                    width: this.width,
                    height: this.height
                };
            }
        }

        // ==========================================
        // ENEMY CLASS (Враги для каждой погоды)
        // ==========================================
        class Enemy {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 50;
                this.type = type; // 'yeti', 'drowned', 'wet_traveler'
                this.speed = 3 + Math.random() * 2;
                this.animationFrame = 0;
            }

            update(gameSpeed) {
                // Враги движутся быстрее чем препятствия
                this.x -= (gameSpeed + this.speed);
                this.animationFrame += 0.1;
            }

            draw(ctx) {
                ctx.save();
                
                switch (this.type) {
                    case 'yeti': // Снежный человек (снег)
                        // Тело
                        ctx.fillStyle = '#F0F8FF';
                        ctx.fillRect(this.x, this.y, this.width, this.height);
                        // Глаза
                        ctx.fillStyle = '#FF0000';
                        ctx.fillRect(this.x + 8, this.y + 10, 8, 8);
                        ctx.fillRect(this.x + 24, this.y + 10, 8, 8);
                        // Рот
                        ctx.fillStyle = '#000';
                        ctx.fillRect(this.x + 12, this.y + 28, 16, 4);
                        // Руки
                        ctx.fillStyle = '#E0E8F0';
                        const armOffset = Math.sin(this.animationFrame) * 5;
                        ctx.fillRect(this.x - 8, this.y + 20 + armOffset, 8, 20);
                        ctx.fillRect(this.x + this.width, this.y + 20 - armOffset, 8, 20);
                        break;
                    
                    case 'drowned': // Утопленник (солнце - парадоксальный враг)
                        // Тело (полупрозрачное)
                        ctx.fillStyle = 'rgba(0, 100, 150, 0.7)';
                        ctx.fillRect(this.x, this.y, this.width, this.height);
                        // Водоросли/капли
                        ctx.fillStyle = 'rgba(0, 150, 100, 0.8)';
                        for (let i = 0; i < 3; i++) {
                            ctx.fillRect(this.x + 5 + i * 12, this.y - 10, 3, 10);
                        }
                        // Глаза (светящиеся)
                        ctx.fillStyle = '#00FF00';
                        ctx.fillRect(this.x + 8, this.y + 12, 6, 6);
                        ctx.fillRect(this.x + 26, this.y + 12, 6, 6);
                        break;
                    
                    case 'wet_traveler': // Промокший путник (дождь)
                        // Тело в плаще
                        ctx.fillStyle = '#4A4A4A';
                        ctx.fillRect(this.x, this.y, this.width, this.height);
                        // Капюшон
                        ctx.fillStyle = '#3A3A3A';
                        ctx.beginPath();
                        ctx.arc(this.x + this.width / 2, this.y + 5, 15, Math.PI, 0);
                        ctx.fill();
                        // Зонт (сломанный)
                        ctx.strokeStyle = '#8B4513';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(this.x + this.width + 5, this.y + 15);
                        ctx.lineTo(this.x + this.width + 15, this.y + 5);
                        ctx.stroke();
                        // Грустное лицо
                        ctx.fillStyle = '#FFD700';
                        ctx.fillRect(this.x + 12, this.y + 15, 5, 5);
                        ctx.fillRect(this.x + 23, this.y + 15, 5, 5);
                        ctx.fillRect(this.x + 15, this.y + 28, 10, 2);
                        break;
                }
                
                ctx.restore();
            }

            isOffScreen() {
                return this.x + this.width < 0;
            }

            getBounds() {
                return {
                    x: this.x,
                    y: this.y,
                    width: this.width,
                    height: this.height
                };
            }
        }

        // ==========================================
        // POWER-UP CLASS (Усиления)
        // ==========================================
        class PowerUp {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 30;
                this.type = type; // 'shield', 'magnet', 'double_score', 'slow_motion'
                this.collected = false;
                this.bobOffset = Math.random() * Math.PI * 2;
            }

            update(speed) {
                this.x -= speed;
                // Анимация покачивания
                this.bobOffset += 0.05;
            }

            draw(ctx) {
                if (this.collected) return;

                const bobY = this.y + Math.sin(this.bobOffset) * 5;

                ctx.save();
                
                switch (this.type) {
                    case 'shield': // Щит (защита от одного удара)
                        ctx.fillStyle = '#4169E1';
                        ctx.beginPath();
                        ctx.arc(this.x + 15, bobY + 15, 15, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#87CEEB';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                        ctx.fillStyle = '#FFF';
                        ctx.font = 'bold 16px Arial';
                        ctx.fillText('🛡️', this.x + 5, bobY + 22);
                        break;
                    
                    case 'magnet': // Магнит (притягивает бонусы)
                        ctx.fillStyle = '#DC143C';
                        ctx.fillRect(this.x, bobY, 30, 30);
                        ctx.fillStyle = '#FFF';
                        ctx.font = 'bold 18px Arial';
                        ctx.fillText('🧲', this.x + 5, bobY + 23);
                        break;
                    
                    case 'double_score': // Двойные очки
                        ctx.fillStyle = '#FFD700';
                        ctx.beginPath();
                        ctx.moveTo(this.x + 15, bobY);
                        ctx.lineTo(this.x + 30, bobY + 15);
                        ctx.lineTo(this.x + 15, bobY + 30);
                        ctx.lineTo(this.x, bobY + 15);
                        ctx.closePath();
                        ctx.fill();
                        ctx.fillStyle = '#000';
                        ctx.font = 'bold 14px Arial';
                        ctx.fillText('x2', this.x + 8, bobY + 20);
                        break;
                    
                    case 'slow_motion': // Замедление времени
                        ctx.fillStyle = '#9370DB';
                        ctx.beginPath();
                        ctx.arc(this.x + 15, bobY + 15, 15, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#FFF';
                        ctx.font = 'bold 16px Arial';
                        ctx.fillText('⏱️', this.x + 5, bobY + 22);
                        break;
                }
                
                ctx.restore();
            }

            isOffScreen() {
                return this.x + this.width < 0;
            }

            getBounds() {
                return {
                    x: this.x,
                    y: this.y + Math.sin(this.bobOffset) * 5,
                    width: this.width,
                    height: this.height
                };
            }
        }

        // ==========================================
        // SNOW PARTICLE CLASS
        // ==========================================
        class SnowParticle {
            constructor(canvasWidth, canvasHeight) {
                this.x = Math.random() * canvasWidth;
                this.y = Math.random() * canvasHeight;
                this.size = Math.random() * 3 + 2;
                this.speedY = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.canvasWidth = canvasWidth;
                this.canvasHeight = canvasHeight;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;

                if (this.y > this.canvasHeight) {
                    this.y = -10;
                    this.x = Math.random() * this.canvasWidth;
                }
            }

            draw(ctx) {
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==========================================
        // RAIN PARTICLE CLASS
        // ==========================================
        class RainParticle {
            constructor(canvasWidth, canvasHeight) {
                this.x = Math.random() * canvasWidth;
                this.y = Math.random() * canvasHeight;
                this.length = Math.random() * 20 + 10;
                this.speedY = Math.random() * 15 + 10;
                this.speedX = Math.random() * 2 - 1;
                this.canvasWidth = canvasWidth;
                this.canvasHeight = canvasHeight;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;

                if (this.y > this.canvasHeight) {
                    this.y = -this.length;
                    this.x = Math.random() * this.canvasWidth;
                }
            }

            draw(ctx) {
                ctx.strokeStyle = 'rgba(174, 194, 224, 0.6)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.speedX, this.y + this.length);
                ctx.stroke();
            }
        }

        // ==========================================
        // SUN PARTICLE CLASS (солнечные лучи/блики)
        // ==========================================
        class SunParticle {
            constructor(canvasWidth, canvasHeight) {
                this.x = Math.random() * canvasWidth;
                this.y = Math.random() * canvasHeight;
                this.size = Math.random() * 4 + 2;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.canvasWidth = canvasWidth;
                this.canvasHeight = canvasHeight;
            }

            update() {
                this.y -= this.speedY; // Движутся вверх
                this.x += this.speedX;

                if (this.y < -10) {
                    this.y = this.canvasHeight + 10;
                    this.x = Math.random() * this.canvasWidth;
                }
            }

            draw(ctx) {
                ctx.fillStyle = `rgba(255, 255, 200, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==========================================
        // STORM PARTICLE CLASS (капли дождя + молнии на фоне)
        // ==========================================
        class StormParticle {
            constructor(canvasWidth, canvasHeight) {
                this.x = Math.random() * canvasWidth;
                this.y = Math.random() * canvasHeight;
                this.length = Math.random() * 25 + 15;
                this.speedY = Math.random() * 20 + 15;
                this.speedX = Math.random() * 3 - 1.5;
                this.canvasWidth = canvasWidth;
                this.canvasHeight = canvasHeight;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;

                if (this.y > this.canvasHeight) {
                    this.y = -this.length;
                    this.x = Math.random() * this.canvasWidth;
                }
            }

            draw(ctx) {
                ctx.strokeStyle = 'rgba(150, 170, 200, 0.8)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.speedX, this.y + this.length);
                ctx.stroke();
            }
        }

        // ==========================================
        // GAME CLASS
        // ==========================================
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.weatherService = new WeatherService();
                
                // Сначала устанавливаем размеры canvas и groundY
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.groundY = Math.floor(window.innerHeight * 0.7);
                
                // Теперь создаём игрока с правильным groundY
                this.player = new Player(100, this.groundY);
                this.obstacles = [];
                this.collectibles = [];
                this.enemies = [];
                this.powerUps = [];
                
                // Частицы для разных погодных условий
                this.snowParticles = [];
                this.rainParticles = [];
                this.sunParticles = [];
                this.stormParticles = [];
                
                this.score = 0;
                this.highScore = localStorage.getItem('weatherRunnerHighScore') || 0;
                this.baseSpeed = 5;
                this.currentSpeed = this.baseSpeed;
                
                this.weather = 'SUNNY';
                this.weatherTemp = 20;
                this.weatherIcon = '☀️';
                this.cityName = 'Неизвестно';
                
                // Power-up состояния
                this.hasShield = false;
                this.hasMagnet = false;
                this.doubleScore = false;
                this.slowMotion = false;
                this.slowMotionTimer = 0;
                this.magnetTimer = 0;
                this.doubleScoreTimer = 0;
                
                this.isRunning = false;
                this.isGameOver = false;
                this.lastObstacleTime = 0;
                this.lastEnemyTime = 0;
                this.lastPowerUpTime = 0;
                this.slipTimer = 0;
                this.notificationTimer = 0;
                
                // Delta time normalization для кросс-платформенной совместимости
                this.lastFrameTime = 0;
                this.targetFPS = 60;
                this.frameInterval = 1000 / this.targetFPS; // 16.67ms для 60 FPS
                this.accumulator = 0;
                
                this.setupEventListeners();
                this.setupResizeListener();
                this.initWeatherParticles();
            }

            updateCanvasSize() {
                // Устанавливаем размер canvas равным размеру окна
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                
                // Адаптируем groundY под высоту экрана (70% от высоты)
                const newGroundY = Math.floor(window.innerHeight * 0.7);
                
                // Обновляем groundY у игрока если он существует
                if (this.player) {
                    // Сохраняем относительную позицию игрока к земле
                    const offsetFromGround = this.player.groundY - this.player.y;
                    this.player.groundY = newGroundY;
                    this.player.y = newGroundY - offsetFromGround;
                }
                
                this.groundY = newGroundY;
            }

            setupResizeListener() {
                window.addEventListener('resize', () => {
                    this.updateCanvasSize();
                    this.initWeatherParticles(); // Пересоздаём все частицы для нового размера
                });
            }

            setupEventListeners() {
                // Keyboard input
                window.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        if (this.isRunning && !this.isGameOver) {
                            this.player.jump();
                        }
                    }
                    
                    // Enter key для поиска города
                    if (e.code === 'Enter' && !this.isRunning) {
                        const cityInput = document.getElementById('cityInput');
                        if (document.activeElement === cityInput && cityInput.value.trim()) {
                            this.searchCity(cityInput.value.trim());
                        }
                    }
                });

                // Touch input for mobile
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (this.isRunning && !this.isGameOver) {
                        this.player.jump();
                    }
                });

                // Кнопка поиска города
                document.getElementById('searchCityButton').addEventListener('click', () => {
                    const cityInput = document.getElementById('cityInput');
                    if (cityInput.value.trim()) {
                        this.searchCity(cityInput.value.trim());
                    } else {
                        this.showNotification('Введите название города!');
                    }
                });

                // Кнопка использования геолокации
                document.getElementById('useLocationButton').addEventListener('click', () => {
                    this.startGameWithLocation();
                });

                // Кнопка старта со случайной погодой
                document.getElementById('startButton').addEventListener('click', () => {
                    this.startGameWithRandomWeather();
                });

                document.getElementById('restartButton').addEventListener('click', () => {
                    this.restartGame();
                });

                document.getElementById('menuButton').addEventListener('click', () => {
                    this.returnToMenu();
                });
            }

            initWeatherParticles() {
                // Инициализируем все типы частиц
                this.snowParticles = [];
                this.rainParticles = [];
                this.sunParticles = [];
                this.stormParticles = [];
                
                // Snow particles (50 частиц)
                for (let i = 0; i < 50; i++) {
                    this.snowParticles.push(new SnowParticle(this.canvas.width, this.canvas.height));
                }
                
                // Rain particles (100 капель для более интенсивного дождя)
                for (let i = 0; i < 100; i++) {
                    this.rainParticles.push(new RainParticle(this.canvas.width, this.canvas.height));
                }
                
                // Sun particles (30 солнечных бликов)
                for (let i = 0; i < 30; i++) {
                    this.sunParticles.push(new SunParticle(this.canvas.width, this.canvas.height));
                }
                
                // Storm particles (150 капель для сильной грозы)
                for (let i = 0; i < 150; i++) {
                    this.stormParticles.push(new StormParticle(this.canvas.width, this.canvas.height));
                }
            }

            async searchCity(cityName) {
                const loader = document.getElementById('loader');
                const weatherInfo = document.getElementById('weatherInfo');
                const startButton = document.getElementById('startButton');
                
                startButton.disabled = true;
                loader.style.display = 'block';
                weatherInfo.style.display = 'none';
                
                try {
                    const weatherData = await this.weatherService.getCurrentWeatherByCity(cityName);
                    this.displayWeatherAndStart(weatherData);
                } catch (error) {
                    loader.style.display = 'none';
                    startButton.disabled = false;
                    this.showNotification('Город не найден! Попробуйте ещё раз.');
                }
            }

            async startGameWithLocation() {
                const loader = document.getElementById('loader');
                const weatherInfo = document.getElementById('weatherInfo');
                const startButton = document.getElementById('startButton');
                
                startButton.disabled = true;
                loader.style.display = 'block';
                weatherInfo.style.display = 'none';
                
                try {
                    const weatherData = await this.weatherService.getCurrentWeather();
                    this.displayWeatherAndStart(weatherData);
                } catch (error) {
                    loader.style.display = 'none';
                    startButton.disabled = false;
                    this.showNotification('Не удалось определить местоположение');
                }
            }

            startGameWithRandomWeather() {
                const weatherData = this.weatherService.getFallbackWeather();
                weatherData.cityName = 'Случайный город';
                this.displayWeatherAndStart(weatherData);
            }

            displayWeatherAndStart(weatherData) {
                const loader = document.getElementById('loader');
                const weatherInfo = document.getElementById('weatherInfo');
                
                this.weatherTemp = weatherData.temp;
                this.weatherIcon = weatherData.icon;
                this.weather = this.weatherService.mapWeatherToGameState(weatherData.weatherCode);
                this.cityName = weatherData.cityName || 'Неизвестно';
                
                // Display weather info
                document.getElementById('weatherIconLarge').textContent = weatherData.icon;
                document.getElementById('tempLarge').textContent = `${weatherData.temp}°C`;
                document.getElementById('cityNameLarge').textContent = this.cityName;
                document.getElementById('weatherDesc').textContent = weatherData.description;
                
                loader.style.display = 'none';
                weatherInfo.style.display = 'block';
                
                setTimeout(() => {
                    document.getElementById('startScreen').classList.add('hidden');
                    document.getElementById('hud').style.display = 'flex';
                    this.updateHUD();
                    
                    // Сброс delta time timers при старте
                    this.lastFrameTime = 0;
                    this.accumulator = 0;
                    
                    this.isRunning = true;
                    requestAnimationFrame((time) => this.gameLoop(time));
                }, 2000);
            }

            restartGame() {
                this.player = new Player(100, this.groundY);
                this.obstacles = [];
                this.collectibles = [];
                this.enemies = [];
                this.powerUps = [];
                this.score = 0;
                this.currentSpeed = this.baseSpeed;
                this.isGameOver = false;
                this.slipTimer = 0;
                
                // Сброс power-ups
                this.hasShield = false;
                this.hasMagnet = false;
                this.doubleScore = false;
                this.slowMotion = false;
                this.slowMotionTimer = 0;
                this.magnetTimer = 0;
                this.doubleScoreTimer = 0;
                
                // Сброс delta time timers
                this.lastFrameTime = 0;
                this.accumulator = 0;
                
                document.getElementById('gameOverScreen').classList.add('hidden');
                document.getElementById('hud').style.display = 'flex';
                this.updateHUD();
                this.isRunning = true;
                requestAnimationFrame((time) => this.gameLoop(time));
            }

            gameLoop(currentTime = 0) {
                if (!this.isRunning || this.isGameOver) return;
                
                // Calculate delta time
                const deltaTime = currentTime - this.lastFrameTime;
                this.lastFrameTime = currentTime;
                
                // Accumulate time and update in fixed time steps
                this.accumulator += deltaTime;
                
                // Update in fixed time steps to maintain consistent physics
                while (this.accumulator >= this.frameInterval) {
                    this.update();
                    this.accumulator -= this.frameInterval;
                }
                
                this.draw();
                
                requestAnimationFrame((time) => this.gameLoop(time));
            }

            update() {
                const now = Date.now();
                
                // Update player with weather-specific gravity
                const currentGravity = this.weather === 'SNOW' ? 0.3 : this.player.gravity;
                this.player.update(currentGravity);
                
                // Update obstacles
                this.obstacles.forEach(obs => obs.update(this.currentSpeed));
                this.obstacles = this.obstacles.filter(obs => !obs.isOffScreen());
                
                // Update collectibles
                this.collectibles.forEach(col => col.update(this.currentSpeed));
                this.collectibles = this.collectibles.filter(col => !col.isOffScreen());
                
                // Update enemies
                this.enemies.forEach(enemy => enemy.update(this.currentSpeed));
                this.enemies = this.enemies.filter(enemy => !enemy.isOffScreen());
                
                // Update power-ups
                this.powerUps.forEach(pu => pu.update(this.currentSpeed));
                this.powerUps = this.powerUps.filter(pu => !pu.isOffScreen());
                
                // Update weather particles based on current weather
                switch (this.weather) {
                    case 'SNOW':
                        this.snowParticles.forEach(particle => particle.update());
                        break;
                    case 'RAIN':
                        this.rainParticles.forEach(particle => particle.update());
                        break;
                    case 'SUNNY':
                        this.sunParticles.forEach(particle => particle.update());
                        break;
                    case 'STORM':
                        this.stormParticles.forEach(particle => particle.update());
                        break;
                }
                
                // Update power-up timers
                this.updatePowerUpTimers();
                
                // Magnet effect: attract collectibles
                if (this.hasMagnet) {
                    this.attractCollectibles();
                }
                
                // Spawn obstacles based on weather
                this.spawnObstacles(now);
                
                // Check collisions
                this.checkCollisions();
                
                // Handle weather effects
                this.handleWeatherEffects();
                
                // Update score
                this.score++;
                document.getElementById('scoreDisplay').textContent = Math.floor(this.score / 10);
                
                // Update notification timer
                if (this.notificationTimer > 0) {
                    this.notificationTimer--;
                    if (this.notificationTimer === 0) {
                        document.getElementById('notification').classList.remove('show');
                    }
                }
            }

            spawnObstacles(now) {
                const obstacleInterval = this.getObstacleInterval();
                
                if (now - this.lastObstacleTime > obstacleInterval) {
                    this.lastObstacleTime = now;
                    
                    // Random chance to spawn collectible or power-up
                    const rand = Math.random();
                    if (rand < 0.15) {
                        this.spawnCollectible();
                    } else if (rand < 0.20) {
                        this.spawnPowerUp();
                    } else {
                        this.spawnObstacle();
                    }
                }
                
                // Spawn enemies based on weather (less frequent than obstacles)
                const enemyInterval = 8000 + Math.random() * 4000; // Every 8-12 seconds
                if (now - this.lastEnemyTime > enemyInterval) {
                    this.lastEnemyTime = now;
                    this.spawnEnemy();
                }
            }

            spawnEnemy() {
                const x = this.canvas.width;
                let type;
                
                // Враг зависит от погоды
                switch (this.weather) {
                    case 'SNOW':
                        type = 'yeti'; // Снежный человек
                        break;
                    case 'SUNNY':
                        type = 'drowned'; // Утопленник (парадоксальный враг на солнце)
                        break;
                    case 'RAIN':
                        type = 'wet_traveler'; // Промокший путник
                        break;
                    case 'STORM':
                        // В грозу может быть любой враг
                        const types = ['yeti', 'drowned', 'wet_traveler'];
                        type = types[Math.floor(Math.random() * types.length)];
                        break;
                    default:
                        type = 'wet_traveler';
                }
                
                // Враги появляются на земле
                const y = this.groundY - 50;
                this.enemies.push(new Enemy(x, y, type));
            }

            spawnPowerUp() {
                const x = this.canvas.width;
                // Power-ups появляются на высоте прыжка
                const jumpHeight = 100;
                const minY = this.groundY - this.player.height - jumpHeight;
                const maxY = this.groundY - this.player.height - 40;
                const y = minY + Math.random() * (maxY - minY);
                
                // Случайный тип power-up
                const types = ['shield', 'magnet', 'double_score', 'slow_motion'];
                const type = types[Math.floor(Math.random() * types.length)];
                
                this.powerUps.push(new PowerUp(x, y, type));
            }

            getObstacleInterval() {
                switch (this.weather) {
                    case 'SUNNY': return 2000 + Math.random() * 1000;
                    case 'RAIN': return 1500 + Math.random() * 800;
                    case 'SNOW': return 2500 + Math.random() * 1000;
                    case 'STORM': return 1000 + Math.random() * 500;
                    default: return 2000;
                }
            }

            spawnObstacle() {
                const x = this.canvas.width;
                let y, width, height, type;
                
                switch (this.weather) {
                    case 'SUNNY':
                        type = 'rock';
                        width = 30;
                        height = 30;
                        y = this.groundY - height;
                        break;
                    
                    case 'RAIN':
                        type = 'puddle';
                        width = 50;
                        height = 15;
                        y = this.groundY - height;
                        break;
                    
                    case 'SNOW':
                        type = 'snowbank';
                        width = 40;
                        height = 35;
                        y = this.groundY - height;
                        break;
                    
                    case 'STORM':
                        // 30% chance for airborne lightning
                        if (Math.random() < 0.3) {
                            type = 'lightning';
                            width = 30;
                            height = 60;
                            // Адаптивная высота для молний (30-50% от высоты экрана)
                            const minY = this.canvas.height * 0.3;
                            const maxY = this.canvas.height * 0.5;
                            y = minY + Math.random() * (maxY - minY);
                        } else {
                            type = 'lightning';
                            width = 30;
                            height = 60;
                            y = this.groundY - height;
                        }
                        break;
                    
                    default:
                        type = 'rock';
                        width = 30;
                        height = 30;
                        y = this.groundY - height;
                }
                
                this.obstacles.push(new Obstacle(x, y, width, height, type));
            }

            spawnCollectible() {
                const x = this.canvas.width;
                // Адаптивная высота для бонусов - на уровне прыжка игрока
                // Игрок может прыгнуть примерно на 100-120px выше земли
                const jumpHeight = 120;
                const minY = this.groundY - this.player.height - jumpHeight;
                const maxY = this.groundY - this.player.height - 30;
                const y = minY + Math.random() * (maxY - minY);
                const type = this.weather === 'RAIN' ? 'umbrella' : 'star';
                this.collectibles.push(new Collectible(x, y, type));
            }

            checkCollisions() {
                const playerBounds = this.player.getBounds();
                
                // Check obstacle collisions
                for (const obstacle of this.obstacles) {
                    if (this.checkAABBCollision(playerBounds, obstacle.getBounds())) {
                        // If shield is active, consume it instead of game over
                        if (this.hasShield) {
                            this.hasShield = false;
                            this.showNotification('🛡️ Щит использован!');
                            // Remove the obstacle
                            this.obstacles = this.obstacles.filter(obs => obs !== obstacle);
                        } else {
                            this.gameOver();
                            return;
                        }
                    }
                }
                
                // Check enemy collisions
                for (const enemy of this.enemies) {
                    if (this.checkAABBCollision(playerBounds, enemy.getBounds())) {
                        // If shield is active, consume it instead of game over
                        if (this.hasShield) {
                            this.hasShield = false;
                            this.showNotification('🛡️ Щит использован!');
                            // Remove the enemy
                            this.enemies = this.enemies.filter(e => e !== enemy);
                        } else {
                            this.gameOver();
                            return;
                        }
                    }
                }
                
                // Check collectible collisions
                for (const collectible of this.collectibles) {
                    if (!collectible.collected && this.checkAABBCollision(playerBounds, collectible.getBounds())) {
                        collectible.collected = true;
                        const points = this.doubleScore ? 1000 : 500;
                        this.score += points;
                        this.showNotification(this.doubleScore ? `+${points} Bonus! (x2)` : '+50 Bonus!');
                    }
                }
                
                // Check power-up collisions
                for (const powerUp of this.powerUps) {
                    if (!powerUp.collected && this.checkAABBCollision(playerBounds, powerUp.getBounds())) {
                        powerUp.collected = true;
                        this.activatePowerUp(powerUp.type);
                        // Remove the power-up
                        this.powerUps = this.powerUps.filter(pu => pu !== powerUp);
                    }
                }
            }

            checkAABBCollision(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            }

            handleWeatherEffects() {
                // RAIN: Slippery effect on puddles
                if (this.weather === 'RAIN' && this.player.isOnGround) {
                    const onPuddle = this.obstacles.some(obs => 
                        obs.type === 'puddle' &&
                        this.player.x + this.player.width > obs.x &&
                        this.player.x < obs.x + obs.width
                    );
                    
                    if (onPuddle) {
                        this.currentSpeed = this.baseSpeed * 1.8;
                        this.slipTimer = 10;
                        if (this.slipTimer === 10) {
                            this.showNotification('Скользко!');
                        }
                    }
                }
                
                // SNOW: Slower movement
                if (this.weather === 'SNOW') {
                    this.currentSpeed = 2.5;
                } else if (this.slipTimer > 0) {
                    this.slipTimer--;
                    if (this.slipTimer === 0) {
                        this.currentSpeed = this.baseSpeed;
                    }
                } else {
                    this.currentSpeed = this.baseSpeed;
                }
                
                // Slow motion effect
                if (this.slowMotion) {
                    this.currentSpeed *= 0.5;
                }
            }

            updatePowerUpTimers() {
                // Update shield timer (permanent until used)
                
                // Update magnet timer
                if (this.hasMagnet) {
                    this.magnetTimer--;
                    if (this.magnetTimer <= 0) {
                        this.hasMagnet = false;
                        this.showNotification('Магнит закончился');
                    }
                }
                
                // Update double score timer
                if (this.doubleScore) {
                    this.doubleScoreTimer--;
                    if (this.doubleScoreTimer <= 0) {
                        this.doubleScore = false;
                        this.showNotification('Двойные очки закончились');
                    }
                }
                
                // Update slow motion timer
                if (this.slowMotion) {
                    this.slowMotionTimer--;
                    if (this.slowMotionTimer <= 0) {
                        this.slowMotion = false;
                        this.showNotification('Замедление закончилось');
                    }
                }
            }

            attractCollectibles() {
                // Magnet effect: pull collectibles towards player
                this.collectibles.forEach(col => {
                    if (!col.collected) {
                        const dx = this.player.x - col.x;
                        const dy = this.player.y - col.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 200) { // Magnet range
                            col.x += dx * 0.05;
                            col.y += dy * 0.05;
                        }
                    }
                });
            }

            activatePowerUp(type) {
                switch (type) {
                    case 'shield':
                        this.hasShield = true;
                        this.showNotification('🛡️ Щит активирован!');
                        break;
                    
                    case 'magnet':
                        this.hasMagnet = true;
                        this.magnetTimer = 600; // 10 seconds at 60fps
                        this.showNotification('🧲 Магнит активирован!');
                        break;
                    
                    case 'double_score':
                        this.doubleScore = true;
                        this.doubleScoreTimer = 600; // 10 seconds
                        this.showNotification('x2 Двойные очки!');
                        break;
                    
                    case 'slow_motion':
                        this.slowMotion = true;
                        this.slowMotionTimer = 480; // 8 seconds
                        this.showNotification('⏱️ Замедление времени!');
                        break;
                }
            }

            showNotification(text) {
                const notification = document.getElementById('notification');
                notification.textContent = text;
                notification.classList.add('show');
                this.notificationTimer = 60; // ~1 second at 60fps
            }

            draw() {
                // Clear canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw background based on weather
                this.drawBackground();
                
                // Draw ground
                this.ctx.fillStyle = '#8B4513';
                this.ctx.fillRect(0, this.groundY, this.canvas.width, this.canvas.height - this.groundY);
                
                // Draw weather particles based on current weather
                switch (this.weather) {
                    case 'SNOW':
                        this.snowParticles.forEach(particle => particle.draw(this.ctx));
                        break;
                    case 'RAIN':
                        this.rainParticles.forEach(particle => particle.draw(this.ctx));
                        break;
                    case 'SUNNY':
                        this.sunParticles.forEach(particle => particle.draw(this.ctx));
                        break;
                    case 'STORM':
                        this.stormParticles.forEach(particle => particle.draw(this.ctx));
                        break;
                }
                
                // Draw obstacles
                this.obstacles.forEach(obs => obs.draw(this.ctx));
                
                // Draw enemies
                this.enemies.forEach(enemy => enemy.draw(this.ctx));
                
                // Draw collectibles
                this.collectibles.forEach(col => col.draw(this.ctx));
                
                // Draw power-ups
                this.powerUps.forEach(pu => pu.draw(this.ctx));
                
                // Draw player
                this.player.draw(this.ctx);
                
                // Draw shield indicator if active
                if (this.hasShield) {
                    this.ctx.fillStyle = 'rgba(65, 105, 225, 0.3)';
                    this.ctx.beginPath();
                    this.ctx.arc(
                        this.player.x + this.player.width / 2,
                        this.player.y + this.player.height / 2,
                        40,
                        0,
                        Math.PI * 2
                    );
                    this.ctx.fill();
                }
            }

            drawBackground() {
                let gradient;
                
                switch (this.weather) {
                    case 'SUNNY':
                        gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                        gradient.addColorStop(0, '#87CEEB');
                        gradient.addColorStop(1, '#E0F6FF');
                        break;
                    
                    case 'RAIN':
                        gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                        gradient.addColorStop(0, '#708090');
                        gradient.addColorStop(1, '#A9A9A9');
                        break;
                    
                    case 'SNOW':
                        gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                        gradient.addColorStop(0, '#B0E0E6');
                        gradient.addColorStop(1, '#F0F8FF');
                        break;
                    
                    case 'STORM':
                        gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                        gradient.addColorStop(0, '#2F1B69');
                        gradient.addColorStop(1, '#4B0082');
                        break;
                    
                    default:
                        gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                        gradient.addColorStop(0, '#87CEEB');
                        gradient.addColorStop(1, '#E0F6FF');
                }
                
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }

            updateHUD() {
                document.getElementById('weatherIcon').textContent = this.weatherIcon;
                document.getElementById('cityDisplay').textContent = this.cityName || 'Неизвестно';
                document.getElementById('tempDisplay').textContent = `${this.weatherTemp}°C`;
            }

            gameOver() {
                this.isGameOver = true;
                this.isRunning = false;
                
                // Update high score
                const finalScore = Math.floor(this.score / 10);
                if (finalScore > this.highScore) {
                    this.highScore = finalScore;
                    localStorage.setItem('weatherRunnerHighScore', this.highScore);
                }
                
                // Show game over screen
                document.getElementById('finalScore').textContent = finalScore;
                document.getElementById('highScore').textContent = this.highScore;
                document.getElementById('hud').style.display = 'none';
                document.getElementById('gameOverScreen').classList.remove('hidden');
            }

            returnToMenu() {
                // Сброс игры
                this.isGameOver = false;
                this.isRunning = false;
                this.score = 0;
                this.obstacles = [];
                this.collectibles = [];
                this.enemies = [];
                this.powerUps = [];
                this.player.y = this.groundY - this.player.height;
                this.player.velocityY = 0;
                this.player.isOnGround = true;
                
                // Сброс power-ups
                this.hasShield = false;
                this.hasMagnet = false;
                this.doubleScore = false;
                this.slowMotion = false;
                this.slowMotionTimer = 0;
                this.magnetTimer = 0;
                this.doubleScoreTimer = 0;
                
                // Скрыть экраны
                document.getElementById('gameOverScreen').classList.add('hidden');
                document.getElementById('startScreen').classList.remove('hidden');
                document.getElementById('weatherInfo').style.display = 'none';
                document.getElementById('startButton').disabled = false;
                
                // Очистить input города
                document.getElementById('cityInput').value = '';
            }
        }

        // ==========================================
        // INITIALIZE GAME
        // ==========================================
        const game = new Game();
    </script>
</body>
</html>
